[package]
name = "app"
version = "0.1.0"
edition = "2024"

[dependencies]
dioxus = { workspace = true, features = ["router"] }
# Needed because the `asset!` macro (used for the shared MAIN_CSS) expands to a
# bare `manganis::` path; renderer crates pull it in transitively, but `app`
# must name it directly to own the asset.
manganis = "0.8.0-alpha.0"
dioxus-use-js = { workspace = true }
ui = { workspace = true }
vault = { workspace = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"

[target.'cfg(target_arch = "wasm32")'.dependencies]
gloo-timers = { version = "0.3", features = ["futures"] }
web-sys = { version = "0.3", features = ["console"] }
wasm-bindgen = "0.2"
js-sys = "0.3"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { version = "1", features = ["time"] }
time = { version = "0.3", features = ["local-offset"] }

[target.'cfg(target_os = "android")'.dependencies]
log = { workspace = true }
