[application]
name = "Oxidian"
version = "0.1.0"
android_manifest = "assets/android/AndroidManifest.xml"

[bundle]
identifier = "com.oxidian.app"
publisher = "Oxidian"
icon = ["assets/icons/icon.png"]
application_name = "Oxidian"

[android]
min_sdk = 24
target_sdk = 35
compile_sdk = 35

[android.permissions]
"android.permission.INTERNET" = { description = "Network access for GitHub/GitLab API" }
"android.permission.ACCESS_NETWORK_STATE" = { description = "Check network connectivity" }
