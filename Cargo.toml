[workspace]
resolver = "2"
members = [
    "packages/ui",
    "packages/vault",
    "packages/app",
    "packages/web",
    "packages/desktop",
    "packages/mobile",
]

[workspace.dependencies]
dioxus = { version = "0.8.0-alpha.0" }
lucide-dioxus = { version="3.11.0", features=["all-icons"] }
# workspace
ui = { path = "packages/ui" }
vault = { path = "packages/vault" }
app = { path = "packages/app" }
